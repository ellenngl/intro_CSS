<!DOCTYPE html>
<html lang="PT-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yullen's Sorveteria</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- banner -->
     <header id="cabecalho">
        <h2 id="titulo">Yullen's Sorveteria</h2> 
        <p> O SORVETE MAIS GOSTOSO DA CIDADE! </p>
        <img src="./img/sorveto_rosa-removebg-preview.png" alt="Sorvete" id="sorvete">
     </header>
     <!-- menu -->
     <nav>
        <span class="menu-item"><a>Home</a></span>
        <span class="menu-item"><a>Cardápio</a></span>
        <span class="menu-item"><a href="contatos.html" target="_blank">Contato</a></span>
     </nav>
     
<br>
  <h2 id="contatos-reclamacao">Mande o seu feedback</h2>

  <form>
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Digite seu email" required>

    <label for="pedido">Número do Pedido:</label>
    <input type="text" id="pedido" name="pedido" placeholder="Ex: #1234">

    <label for="mensagem">Sua reclamação:</label>
    <textarea id="mensagem" name="mensagem" rows="4" placeholder="Escreva sua reclamação..." required></textarea>

    <button type="submit">Enviar</button>
  </form>
</section>
     </nav>
    
     <br>
</body>
</html>
